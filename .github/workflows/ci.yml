name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Tests unitaires & fonctionnels
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Configuration de Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Installation des dépendances
        run: pip install -r requirements.txt

      - name: Lancement des tests
        run: pytest tests/ -v --tb=short --cov=scripts --cov=api --cov-fail-under=70
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          API_KEY: ${{ secrets.API_KEY }}

  evaluate:
    name: Évaluation RAG
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - run: pip install -r requirements.txt

      - name: Build index
        run: |
          python scripts/fetch_events.py
          python scripts/clean_events.py
          python scripts/build_index.py
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}

      - name: Evaluate RAG
        run: python tests/evaluate_rag.py --output-dir results
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}

      - uses: actions/upload-artifact@v4
        with:
          name: evaluation-results
          path: results/eval_*.json
          retention-days: 30
